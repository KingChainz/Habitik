# Configuración SonarCloud para Habitik Flutter
# https://sonarcloud.io/project/overview?id=KingChainz_Habitik

sonar.projectKey=KingChainz_Habitik
sonar.organization=kingchainz

# Nombre y versión del proyecto
sonar.projectName=Habitik
sonar.projectVersion=1.0

# Directorio raíz de fuentes
sonar.sources=lib
sonar.tests=test

# Lenguaje
sonar.language=dart

# Exclusiones (no analizar archivos generados o de build)
sonar.exclusions=\
  **/*.g.dart,\
  **/*.freezed.dart,\
  **/generated/**,\
  build/**,\
  .dart_tool/**,\
  **/*.gr.dart

# Exclusiones de tests
sonar.test.exclusions=test/**

# Cobertura de código (requiere flutter test --coverage)
sonar.dart.lcov.reportPaths=coverage/lcov.info

# Encoding del código fuente
sonar.sourceEncoding=UTF-8

# Host (SonarCloud)
sonar.host.url=https://sonarcloud.io

# Exclusiones de Cobertura para UI y archivos principales
sonar.coverage.exclusions=\
  lib/screens/**,\
  lib/widgets/**,\
  lib/main.dart,\
  lib/app.dart

# Exclusiones de Duplicación (CPD) para UI y constantes de trivia
sonar.cpd.exclusions=\
  lib/screens/**,\
  lib/widgets/**,\
  lib/constants/trivia_questions.dart
